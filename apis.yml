name: American Tire Distributors Holdings
description: >-
  American Tire Distributors (ATD) is one of the largest independent suppliers of
  replacement tires in North America, distributing passenger, light truck, medium truck,
  and specialty tires from more than 110 distribution centers. ATD delivers over 30.5
  million tire units annually to more than 85,000 delivery points across the United States
  and Canada, serving independent tire dealers, automotive service centers, and retailers.
tags:
  - Tires
