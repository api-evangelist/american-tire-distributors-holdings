apis: []
common:
  - type: Website
    url: https://www.atd.com
  - type: Portal
    url: https://www.atd.com/login
    name: ATDOnline Dealer Portal
  - type: Features
    data:
      - name: Tire Distribution Network
        description: >-
          Distribution of 16,500+ active tire products across 110+ distribution centers
          with 1,400+ delivery vehicles serving over 85,000 delivery points nationwide.
      - name: ATDOnline Customer Portal
        description: >-
          Digital ordering and account management portal for tire dealers to browse
          inventory, place orders, track deliveries, and manage accounts online.
      - name: Inventory Recommendation Engine
        description: >-
          Data-driven tire recommendation engine helping dealers optimize inventory
          selection and improve same-day sales performance.
      - name: Next-Day Delivery
        description: >-
          Nationwide next-day tire delivery capabilities from strategically located
          distribution centers to maximize tire dealer inventory efficiency.
      - name: Dealer Business Support
        description: >-
          Full-service business support including strategic planning, marketing resources,
          and operational guidance for independent tire dealer customers.
      - name: Specialty and Commercial Tires
        description: >-
          Distribution of specialty tires including medium truck, farm, recreational
          vehicle, and off-the-road tires alongside standard passenger and light truck products.
  - type: UseCases
    data:
      - name: Independent Tire Dealer Supply
        description: >-
          Providing independent tire dealers with just-in-time tire inventory replenishment
          from local distribution centers to minimize on-hand stock requirements.
      - name: Automotive Service Center Inventory
        description: >-
          Supplying automotive service chains, quick-lube centers, and dealerships with
          replacement tires to support their vehicle service operations.
      - name: Commercial Fleet Tire Management
        description: >-
          Supplying medium truck and commercial tires for fleet maintenance operations
          and commercial vehicle service providers.
      - name: Retail Tire Program Management
        description: >-
          Supporting retailers and buying groups with private-label tire programs and
          branded tire distribution across national accounts.
  - type: Integrations
    data:
      - name: Dealer Management Systems
        description: >-
          Integration with tire dealer management systems for automated inventory ordering,
          price updates, and order tracking through ATD's digital platform.
      - name: Point-of-Sale Systems
        description: >-
          Connectivity with dealer point-of-sale and service management software for
          real-time inventory availability and order placement.
